<script src="/ffmpeg/ffmpeg.min.js"></script>
<script>
// ── СТАН ──
let stream = null, mediaRecorder = null;
let takes = [], currentChunks = [];
let isRecording = false, isStopping = false; // Виправлено дублювання оголошення
let timerInterval = null, timerStart = 0;
let deleteClickTimeout = null, deleteClickCount = 0;
let facingMode = 'environment';
let sessionMimeType = null;

// Глобальний екземпляр FFmpeg для запобігання помилок "not ready"
let ffmpegInstance = null;
let isFFmpegLoading = false;

const SETTINGS_KEY = 'take_app_v2';
let S = {
  videoBitrate: 8000000,
  audioBitrate: 128000,
  freezeOpacity: 0.35,
  fps: 30,
  trimSilence: false,
  trimThreshold: -40,
};

// ── НАЛАШТУВАННЯ: збереження/завантаження ──
function loadSettings() {
  try { const s = localStorage.getItem(SETTINGS_KEY); if (s) Object.assign(S, JSON.parse(s)); } catch(e) {}
}
function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(S)); } catch(e) {}
}
function applySettingsToUI() {
  document.querySelectorAll('.quality-btn[data-mbps]').forEach(b => b.classList.toggle('active', parseInt(b.dataset.mbps) === S.videoBitrate/1000000));
  document.getElementById('quality-label').textContent = `${S.videoBitrate/1000000} Mbps`;
  document.getElementById('mem-mbps').textContent = S.videoBitrate/1000000;
  document.getElementById('mem-per-min').textContent = Math.round(S.videoBitrate/1000000*60/8);
  document.querySelectorAll('.quality-btn[data-fps]').forEach(b => b.classList.toggle('active', parseInt(b.dataset.fps) === S.fps));
  document.getElementById('fps-label').textContent = `${S.fps} fps`;
  document.getElementById('audio-slider').value = S.audioBitrate/1000;
  document.getElementById('audio-label').textContent = `${S.audioBitrate/1000} kbps`;
  document.getElementById('opacity-slider').value = Math.round(S.freezeOpacity*100);
  document.getElementById('opacity-label').textContent = `${Math.round(S.freezeOpacity*100)}%`;
  document.getElementById('toggle-trim').classList.toggle('on', S.trimSilence);
  document.getElementById('trim-options').style.display = S.trimSilence ? 'block' : 'none';
  document.getElementById('trim-slider').value = S.trimThreshold;
  document.getElementById('trim-label').textContent = `${S.trimThreshold} dB`;
}

function updateMemLabel() {
  const totalSize = takes.reduce((acc, t) => acc + t.blob.size, 0);
  document.getElementById('mem-label').textContent = `${(totalSize / 1024 / 1024).toFixed(1)} MB`;
}

function setQuality(btn) {
  document.querySelectorAll('.quality-btn[data-mbps]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.videoBitrate = parseInt(btn.dataset.mbps) * 1000000;
  sessionMimeType = null;
  document.getElementById('quality-label').textContent = `${btn.dataset.mbps} Mbps`;
  document.getElementById('mem-mbps').textContent = btn.dataset.mbps;
  document.getElementById('mem-per-min').textContent = Math.round(parseInt(btn.dataset.mbps)*60/8);
  updateMemLabel(); saveSettings();
}
function setFps(btn) {
  document.querySelectorAll('.quality-btn[data-fps]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.fps = parseInt(btn.dataset.fps);
  document.getElementById('fps-label').textContent = `${S.fps} fps`;
  saveSettings();
  if (!isRecording) startCamera(facingMode);
}
function setAudio(input) {
  S.audioBitrate = parseInt(input.value) * 1000;
  document.getElementById('audio-label').textContent = `${input.value} kbps`;
  saveSettings();
}
function setOpacity(input) {
  S.freezeOpacity = parseInt(input.value) / 100;
  document.getElementById('opacity-label').textContent = `${input.value}%`;
  document.getElementById('freeze-canvas').style.opacity = S.freezeOpacity;
  saveSettings();
}
function toggleTrim() {
  S.trimSilence = !S.trimSilence;
  document.getElementById('toggle-trim').classList.toggle('on', S.trimSilence);
  document.getElementById('trim-options').style.display = S.trimSilence ? 'block' : 'none';
  saveSettings();
}
function setTrimThreshold(input) {
  S.trimThreshold = parseInt(input.value);
  document.getElementById('trim-label').textContent = `${input.value} dB`;
  saveSettings();
}
function openSettings() { updateMemLabel(); document.getElementById('settings-overlay').classList.add('show'); }
function closeSettings() { document.getElementById('settings-overlay').classList.remove('show'); }

function showStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function updateUI() {
  const recBtn = document.getElementById('btn-record');
  const badge = document.getElementById('rec-badge');
  const counter = document.getElementById('take-counter');
  const delBtn = document.getElementById('btn-delete');
  const editBtn = document.getElementById('btn-edit');
  const pipsContainer = document.getElementById('takes-list');

  if (isRecording) {
    recBtn.classList.add('recording');
    badge.classList.add('visible');
    showStatus('ЗАПИС КАНАЛУ...');
  } else {
    recBtn.classList.remove('recording');
    badge.classList.remove('visible');
    showStatus(takes.length > 0 ? 'ГОТОВИЙ ДО НАСТУПНОГО ДУБЛЯ' : 'НАТИСНІТЬ ДЛЯ ЗАПИСУ');
  }

  counter.textContent = `ДУБЛЬ ${takes.length + 1}`;
  
  if (takes.length > 0 && !isRecording) {
    delBtn.classList.remove('disabled');
    editBtn.classList.remove('disabled');
  } else {
    delBtn.classList.add('disabled');
    editBtn.classList.add('disabled');
  }

  pipsContainer.innerHTML = '';
  for (let i = 0; i < takes.length; i++) {
    const pip = document.createElement('div');
    pip.className = 'take-pip done';
    pipsContainer.appendChild(pip);
  }
  if (isRecording) {
    const pip = document.createElement('div');
    pip.className = 'take-pip recording';
    pipsContainer.appendChild(pip);
  }
}

// ── ІНІЦІАЛІЗАЦІЯ FFmpeg (Один раз при старті) ──
async function initFFmpeg() {
  if (ffmpegInstance) return ffmpegInstance;
  if (isFFmpegLoading) return;
  isFFmpegLoading = true;
  
  const { createFFmpeg } = FFmpeg;
  ffmpegInstance = createFFmpeg({
    log: true,
    corePath: '/ffmpeg/ffmpeg-core.js'
  });
  
  try {
    await ffmpegInstance.load();
  } catch (err) {
    console.error("FFmpeg load failed:", err);
  } finally {
    isFFmpegLoading = false;
  }
  return ffmpegInstance;
}

// ── КАМЕРА ──
async function init() {
  loadSettings();
  applySettingsToUI();
  await startCamera(facingMode);
  initFFmpeg(); // Фонове завантаження FFmpeg, щоб не чекати під час монтажу
}

async function startCamera(facing) {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:S.fps, max:S.fps} },
      audio: true
    });
  } catch(e) {
    try { stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true }); }
    catch(e2) { document.getElementById('no-camera').classList.add('show'); return; }
  }
  const video = document.getElementById('video');
  video.srcObject = stream;
  video.classList.toggle('mirrored', facing === 'user');
  try { await video.play(); } catch(e) {}
  updateUI();
}

async function flipCamera() {
  if (isRecording) return;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera(facingMode);
}

// ── ЗАПИС ──
function getSessionMimeType() {
  if (sessionMimeType) return sessionMimeType;
  const types = ['video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus', 'video/webm'];
  sessionMimeType = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  return sessionMimeType;
}

function handleRecord() {
  if (!stream || isStopping) return;
  if (isRecording) stopRecording(); else startRecording();
}

function startRecording() {
  hideFreezeFrame();
  currentChunks = [];
  mediaRecorder = null;

  if (!stream.getTracks().some(t => t.readyState === 'live')) {
    startCamera(facingMode).then(() => setTimeout(startRecording, 300));
    return;
  }

  const mime = getSessionMimeType();
  const opts = { videoBitsPerSecond: S.videoBitrate, audioBitsPerSecond: S.audioBitrate };
  if (mime) opts.mimeType = mime;

  try { mediaRecorder = new MediaRecorder(stream, opts); }
  catch(e) {
    try { mediaRecorder = new MediaRecorder(stream, mime ? {mimeType:mime} : {}); }
    catch(e2) { try { mediaRecorder = new MediaRecorder(stream); } catch(e3) { showStatus('ПОМИЛКА ЗАПИСУ'); return; } }
  }

  const recMime = mediaRecorder.mimeType || 'video/webm';
  mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) currentChunks.push(e.data); };
  mediaRecorder.onerror = () => { isRecording = false; isStopping = false; stopTimer(); showStatus('ПОМИЛКА'); updateUI(); };

  mediaRecorder.onstop = () => {
    isStopping = false;
    if (currentChunks.length > 0)
      takes.push({ blob: new Blob(currentChunks, {type:recMime}), mimeType: recMime });
    currentChunks = [];
    showFreezeFrame();
    updateUI();
    updateMemLabel();
  };

  mediaRecorder.start(10);
  isRecording = true;
  timerStart = Date.now();
  startTimer();
  updateUI();
}

function stopRecording() {
  if (mediaRecorder?.state === 'recording') {
    isStopping = true;
    mediaRecorder.requestData();
    mediaRecorder.stop();
  }
  isRecording = false;
  stopTimer();
}

// ── ЗАМОРОЖЕНИЙ КАДР ──
function showFreezeFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('freeze-canvas');
  canvas.width = video.videoWidth || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  canvas.style.opacity = S.freezeOpacity;
  canvas.style.display = 'block';
  document.getElementById('pause-overlay').classList.add('active');
}
function hideFreezeFrame() {
  document.getElementById('freeze-canvas').style.display = 'none';
  document.getElementById('pause-overlay').classList.remove('active');
}

// ── ТАЙМЕР ──
function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 500); updateTimer(); }
function stopTimer() { clearInterval(timerInterval); document.getElementById('timer').textContent = '00:00'; }
function updateTimer() {
  const s = Math.floor((Date.now()-timerStart)/1000);
  document.getElementById('timer').textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

// ── ВИДАЛЕННЯ ──
function handleDelete() {
  if (isRecording || takes.length === 0) return;
  deleteClickCount++;
  clearTimeout(deleteClickTimeout);
  if (deleteClickCount === 1) {
    if (takes.length >= 2) document.getElementById('delete-hint').classList.add('show');
    deleteClickTimeout = setTimeout(() => {
      if (deleteClickCount === 1) { takes.pop(); if (takes.length > 0) showFreezeFrame(); else hideFreezeFrame(); updateUI(); updateMemLabel(); showStatus('ДУБЛЬ ВИДАЛЕНО'); }
      deleteClickCount = 0;
      document.getElementById('delete-hint').classList.remove('show');
    }, 400);
  } else if (deleteClickCount >= 2) {
    clearTimeout(deleteClickTimeout); deleteClickCount = 0;
    document.getElementById('delete-hint').classList.remove('show');
    const n = Math.min(2, takes.length);
    takes.splice(-n);
    if (takes.length > 0) showFreezeFrame(); else hideFreezeFrame();
    updateUI(); updateMemLabel(); showStatus(`ВИДАЛЕНО ${n} ДУБЛІ`);
  }
}

// ── МОНТАЖ МОДАЛ ──
function openModal() {
  if (isRecording) stopRecording();
  document.getElementById('modal-desc').textContent = `${takes.length} ${pluralTake(takes.length)} будуть склеєні в одне відео`;
  document.getElementById('modal-takes').innerHTML = takes.map((t,i) => {
    const mb = (t.blob.size/1000000).toFixed(1);
    return `<div class="modal-take-chip">ДУБЛЬ ${i+1} · ${mb}MB</div>`;
  }).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function pluralTake(n) { return n===1?'дубль':n<=4?'дублі':'дублів'; }

// ── АНАЛІЗ ТИШІ ──
async function analyzeAudioBounds(blob) {
  const ab = await blob.arrayBuffer();
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let buf;
  try { buf = await ctx.decodeAudioData(ab); }
  catch(e) { ctx.close(); return null; }
  finally { ctx.close(); }

  const threshold = Math.pow(10, S.trimThreshold / 20);
  const sr = buf.sampleRate;
  const len = buf.length;
  const ch = buf.numberOfChannels;

  let startSample = 0;
  outer1: for (let i = 0; i < len; i++)
    for (let c = 0; c < ch; c++)
      if (Math.abs(buf.getChannelData(c)[i]) > threshold) { startSample = i; break outer1; }

  let endSample = len - 1;
  outer2: for (let i = len-1; i >= 0; i--)
    for (let c = 0; c < ch; c++)
      if (Math.abs(buf.getChannelData(c)[i]) > threshold) { endSample = i; break outer2; }

  const start = Math.max(0, startSample/sr - 0.05);
  const end = Math.min(len/sr, endSample/sr + 0.05);
  const total = len/sr;

  if (start < 0.1 && (total - end) < 0.1) return null;
  return { start, end };
}

// ── ГАРЯЧІ КЛАВІШІ (Bluetooth-пульти) ──
window.addEventListener('keydown', e => {
  if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    handleRecord();
  }
});

// ── ВИПРАВЛЕНИЙ РЕНДЕР (Транскодування + Перевикористання) ──
async function startRender() {
  closeModal();
  if (takes.length === 0) return;

  const progWindow = document.getElementById('render-progress');
  const progFill = document.getElementById('progress-fill');
  const progLabel = document.getElementById('render-label');

  progWindow.classList.add('show');
  progFill.style.width = '0%';
  progLabel.textContent = 'ІНІЦІАЛІЗАЦІЯ FFMEG...';

  // Отримуємо або ініціалізуємо стабільний екземпляр воркера
  const ffmpeg = await initFFmpeg();
  if (!ffmpeg || !ffmpeg.isLoaded()) {
    alert("FFmpeg не вдалося завантажити. Перевірте COOP/COEP заголовки.");
    progWindow.classList.remove('show');
    return;
  }

  // Відстеження прогресу для UI
  ffmpeg.setProgress(({ ratio }) => {
    const p = Math.min(100, Math.max(0, Math.round(ratio * 100)));
    progFill.style.width = `${p}%`;
    progLabel.textContent = `ОБРОБКА ВІДЕО: ${p}%`;
  });

  try {
    progLabel.textContent = `ПІДГОТОВКА ФАЙЛІВ...`;
    const inputNames = [];
    let filterString = "";

    // Завантажуємо всі дублі у віртуальну FS FFmpeg
    for (let i = 0; i < takes.length; i++) {
      const take = takes[i];
      const filename = `input_${i}.webm`;
      
      // Перетворюємо Blob в Uint8Array для FFmpeg.FS
      const buffer = await take.blob.arrayBuffer();
      ffmpeg.FS('writeFile', filename, new Uint8Array(buffer));
      inputNames.push(filename);

      // Опціональний аналіз та обрізання тиші
      let trimFilter = "";
      if (S.trimSilence) {
        progLabel.textContent = `АНАЛІЗ ТИШІ ДУБЛЯ ${i+1}...`;
        const bounds = await analyzeAudioBounds(take.blob);
        if (bounds) {
          trimFilter = `trim=${bounds.start.toFixed(3)}:${bounds.end.toFixed(3)},setpts=PTS-STARTPTS,`;
          // Для аудіо використовуємо atrim
          filterString += `[${i}:a]atrim=${bounds.start.toFixed(3)}:${bounds.end.toFixed(3)},asetpts=PTS-STARTPTS[a${i}];`;
        } else {
          filterString += `[${i}:a]asplit[a${i}];`;
        }
      } else {
        filterString += `[${i}:a]asplit[a${i}];`;
      }

      // Додаємо базову фільтрацію відео (на випадок якщо на мобільних Chrome збилися пропорції)
      filterString += `[${i}:v]${trimFilter}scale=1920:1080,setpts=PTS-STARTPTS[v${i}];`;
    }

    // Збираємо повну інструкцію для filter_complex склеювання
    let concatInputs = "";
    for (let i = 0; i < takes.length; i++) {
      concatInputs += `[v${i}][a${i}]`;
    }
    filterString += `${concatInputs}concat=n=${takes.length}:v=1:a=1[v_out][a_out]`;

    progLabel.textContent = `КОНВЕРТАЦІЯ ТА СКЛЕЮВАННЯ (ЯКІСТЬ: ${S.videoBitrate/1000000} Mbps)...`;

    // Формуємо масив аргументів CLI
    const args = [];
    for (const name of inputNames) {
      args.push('-i', name);
    }
    
    args.push(
      '-filter_complex', filterString,
      '-map', '[v_out]',
      '-map', '[a_out]',
      '-c:v', 'libx264',           // Явно вказуємо кодек H.264
      '-b:v', `${S.videoBitrate}`, // Встановлюємо бітрейт відео
      '-r', `${S.fps}`,            // Частота кадрів
      '-pix_fmt', 'yuv420p',       // Формат пікселів, сумісний з усіма плеєрами Android/iOS
      '-c:a', 'aac',               // Транскодуємо аудіо в AAC
      '-b:a', `${S.audioBitrate}`, // Бітрейт аудіо
      '-preset', 'ultrafast',      // Максимальна швидкість для мобільних процесорів
      'output.mp4'
    );

    // Запуск обробки
    await ffmpeg.run(...args);

    progLabel.textContent = `ЗБЕРЕЖЕННЯ...`;
    
    // Читаємо готовий MP4 файл з FS
    const data = ffmpeg.FS('readFile', 'output.mp4');
    const outBlob = new Blob([data.buffer], { type: 'video/mp4' });
    
    // Створюємо посилання та завантажуємо файл на телефон
    const url = URL.createObjectURL(outBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `TAKE_${Date.now()}.mp4`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Очищення віртуальної пам'яті WASM від сміття
    for (const name of inputNames) {
      try { ffmpeg.FS('unlink', name); } catch(e){}
    }
    try { ffmpeg.FS('unlink', 'output.mp4'); } catch(e){}

    showStatus('ВІДЕО ЗБЕРЕЖЕНО!');
    takes = []; // Скидаємо дублі після успішного монтажу
    hideFreezeFrame();
    updateUI();

  } catch (err) {
    console.error("Render Error: ", err);
    alert("Помилка під час монтажу відео. Перевірте параметри.");
  } finally {
    progWindow.classList.remove('show');
  }
}

// Запуск при завантаженні сторінки
window.onload = init;
</script>
