<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff2020;
    --white: #f0ede8;
    --black: #0a0a0a;
    --glass: rgba(240,237,232,0.08);
    --glass-border: rgba(240,237,232,0.15);
    --overlay: rgba(10,10,10,0.55);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    touch-action: manipulation;
  }

  #camera-wrap { position: fixed; inset: 0; background: #000; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }

  #pause-overlay {
    position: fixed; inset: 0;
    background: var(--overlay);
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease; z-index: 5;
  }
  #pause-overlay.active { opacity: 1; }

  #rec-badge {
    position: fixed; top: 20px; left: 20px;
    display: flex; align-items: center; gap: 8px;
    z-index: 20; opacity: 0; transition: opacity 0.2s;
  }
  #rec-badge.visible { opacity: 1; }
  .rec-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red);
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #rec-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 3px; color: var(--red);
  }

  #take-counter {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 4px;
    color: rgba(240,237,232,0.5); z-index: 20; white-space: nowrap;
  }

  #timer {
    position: fixed; top: 20px; right: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    color: rgba(240,237,232,0.6); z-index: 20;
    font-variant-numeric: tabular-nums;
  }

  #takes-list {
    position: fixed; left: 0; top: 0; bottom: 0; width: 56px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; z-index: 20; padding: 80px 0;
  }
  .take-pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(240,237,232,0.25); transition: all 0.3s;
  }
  .take-pip.done { background: var(--white); width: 8px; height: 8px; }
  .take-pip.recording {
    background: var(--red); width: 10px; height: 10px;
    box-shadow: 0 0 8px var(--red);
  }

  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 24px 24px 40px;
    display: flex; align-items: flex-end; justify-content: space-between;
    z-index: 30;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  #btn-delete {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; opacity: 0.85;
    transition: opacity 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none; min-width: 64px;
  }
  #btn-delete:active { transform: scale(0.92); }
  #btn-delete.disabled { opacity: 0.2; pointer-events: none; }

  .btn-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--glass); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  #btn-delete .btn-icon {
    background: rgba(255,32,32,0.12);
    border-color: rgba(255,32,32,0.3);
  }

  .btn-label {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(240,237,232,0.5); text-align: center; line-height: 1.3;
  }

  #delete-count-badge {
    position: absolute; top: -4px; right: -4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--red); font-size: 10px; font-weight: 700;
    display: none; align-items: center; justify-content: center; color: #fff;
  }
  #delete-count-badge.show { display: flex; }
  .icon-wrap { position: relative; }

  #btn-record {
    width: 72px; height: 72px; border-radius: 50%;
    cursor: pointer; position: relative;
    -webkit-tap-highlight-color: transparent; user-select: none;
    transition: transform 0.15s; flex-shrink: 0;
  }
  #btn-record:active { transform: scale(0.94); }

  .record-ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid rgba(240,237,232,0.3); transition: border-color 0.3s;
  }
  #btn-record.recording .record-ring {
    border-color: var(--red);
    animation: ring-pulse 1.5s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:0.6}
  }

  .record-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--white);
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; justify-content: center;
  }
  #btn-record.recording .record-inner {
    background: var(--red); border-radius: 16px;
    width: 38px; height: 38px; margin: 17px;
  }

  #btn-edit {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; opacity: 0.85;
    transition: opacity 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none; min-width: 64px;
  }
  #btn-edit:active { transform: scale(0.92); }
  #btn-edit.disabled { opacity: 0.2; pointer-events: none; }

  #status-msg {
    position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(240,237,232,0.45); z-index: 25; white-space: nowrap;
    transition: opacity 0.4s;
  }

  #delete-hint {
    position: fixed; bottom: 130px; right: 20px;
    font-size: 9px; letter-spacing: 1.5px;
    color: rgba(255,32,32,0.5); text-transform: uppercase;
    z-index: 25; text-align: right; line-height: 1.6;
    opacity: 0; transition: opacity 0.4s;
  }
  #delete-hint.show { opacity: 1; }

  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
    z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: #111; border: 1px solid rgba(240,237,232,0.1);
    border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 420px; text-align: center;
  }
  #modal h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 32px;
    letter-spacing: 4px; margin-bottom: 8px;
  }
  #modal p {
    font-size: 12px; color: rgba(240,237,232,0.5);
    letter-spacing: 1px; margin-bottom: 28px; line-height: 1.6;
  }
  #modal-takes {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 28px;
  }
  .modal-take-chip {
    padding: 6px 14px; border-radius: 20px;
    background: var(--glass); border: 1px solid var(--glass-border);
    font-size: 11px; letter-spacing: 1px; color: rgba(240,237,232,0.7);
  }
  #modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .modal-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    transition: transform 0.15s, opacity 0.2s;
  }
  .modal-btn:active { transform: scale(0.97); }
  .modal-btn-primary { background: var(--white); color: var(--black); }
  .modal-btn-secondary {
    background: transparent; border: 1px solid rgba(240,237,232,0.2);
    color: rgba(240,237,232,0.6);
  }

  #render-progress {
    position: fixed; inset: 0; background: var(--black); z-index: 200;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  }
  #render-progress.show { display: flex; }
  #render-progress h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 6px; }
  .progress-bar-wrap { width: 260px; height: 3px; background: rgba(240,237,232,0.1); border-radius: 2px; overflow: hidden; }
  #progress-fill { height: 100%; background: var(--white); border-radius: 2px; width: 0%; transition: width 0.3s; }
  #render-label { font-size: 11px; letter-spacing: 2px; color: rgba(240,237,232,0.4); }

  #no-camera {
    position: fixed; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 32px; z-index: 50;
  }
  #no-camera.show { display: flex; }
  #no-camera h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; }
  #no-camera p { font-size: 12px; color: rgba(240,237,232,0.5); letter-spacing: 1px; }

  svg { display: block; }
</style>
</head>
<body>

<div id="camera-wrap"><video id="video" autoplay muted playsinline></video></div>
<div id="pause-overlay"></div>

<div id="rec-badge">
  <div class="rec-dot"></div>
  <div id="rec-label">REC</div>
</div>

<div id="take-counter">ДУБЛЬ 1</div>
<div id="timer">00:00</div>
<div id="takes-list"></div>
<div id="status-msg">НАЖМИТЕ ДЛЯ ЗАПИСИ</div>
<div id="delete-hint">2× УДАЛИТЬ 2 ДУБЛЯ</div>

<div id="bottom-bar">
  <div id="btn-delete" class="disabled" onclick="handleDelete()">
    <div class="icon-wrap">
      <div class="btn-icon">
        <div id="delete-count-badge">2</div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14H6L5 6"></path>
          <path d="M10 11v6M14 11v6"></path>
          <path d="M9 6V4h6v2"></path>
        </svg>
      </div>
    </div>
    <span class="btn-label">УДАЛИТЬ<br>ДУБЛЬ</span>
  </div>

  <div id="btn-record" onclick="handleRecord()">
    <div class="record-ring"></div>
    <div class="record-inner"></div>
  </div>

  <div id="btn-edit" class="disabled" onclick="openModal()">
    <div class="btn-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="3" x2="6" y2="15"></line>
        <circle cx="18" cy="6" r="3"></circle>
        <circle cx="6" cy="18" r="3"></circle>
        <path d="M18 9a9 9 0 0 1-9 9"></path>
      </svg>
    </div>
    <span class="btn-label">МОНТАЖ</span>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>МОНТАЖ</h2>
    <p id="modal-desc">Склеить все дубли в одно видео?</p>
    <div id="modal-takes"></div>
    <div id="modal-actions">
      <button class="modal-btn modal-btn-primary" onclick="startRender()">СКЛЕИТЬ И СКАЧАТЬ</button>
      <button class="modal-btn modal-btn-secondary" onclick="closeModal()">ПРОДОЛЖИТЬ СЪЁМКУ</button>
    </div>
  </div>
</div>

<div id="render-progress">
  <h2>МОНТАЖ...</h2>
  <div class="progress-bar-wrap"><div id="progress-fill"></div></div>
  <div id="render-label">ПОДГОТОВКА</div>
</div>

<div id="no-camera">
  <h2>НЕТ КАМЕРЫ</h2>
  <p>Разрешите доступ к камере<br>и микрофону в браузере</p>
</div>

<script>
let stream = null, mediaRecorder = null;
let takes = [], currentChunks = [];
let isRecording = false;
let timerInterval = null, timerStart = 0;
let deleteClickTimeout = null, deleteClickCount = 0;

async function init() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio: true
    });
    document.getElementById('video').srcObject = stream;
    updateUI();
  } catch(e) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('video').srcObject = stream;
      updateUI();
    } catch(e2) {
      document.getElementById('no-camera').classList.add('show');
    }
  }
}

function handleRecord() {
  if (!stream) return;
  if (isRecording) stopRecording(); else startRecording();
}

function startRecording() {
  if (!stream) return;
  currentChunks = [];
  const mime = getSupportedMimeType();
  try { mediaRecorder = new MediaRecorder(stream, mime ? {mimeType: mime} : {}); }
  catch(e) { mediaRecorder = new MediaRecorder(stream); }

  mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) currentChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const mimeType = mediaRecorder.mimeType || 'video/webm';
    takes.push({ blob: new Blob(currentChunks, {type: mimeType}), duration: Date.now() - timerStart, mimeType });
    currentChunks = [];
    updateUI();
  };

  mediaRecorder.start(100);
  isRecording = true;
  timerStart = Date.now();
  startTimer();
  updateUI();
  document.getElementById('video').play();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  stopTimer();
  updateUI();
}

function getSupportedMimeType() {
  const types = ['video/mp4;codecs=h264,aac','video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 500);
  updateTimer();
}
function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '00:00';
}
function updateTimer() {
  const s = Math.floor((Date.now() - timerStart) / 1000);
  document.getElementById('timer').textContent =
    String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function handleDelete() {
  if (isRecording || takes.length === 0) return;
  deleteClickCount++;
  clearTimeout(deleteClickTimeout);
  if (deleteClickCount === 1) {
    if (takes.length >= 2) document.getElementById('delete-hint').classList.add('show');
    deleteClickTimeout = setTimeout(() => {
      if (deleteClickCount === 1) { takes.pop(); updateUI(); }
      deleteClickCount = 0;
      document.getElementById('delete-hint').classList.remove('show');
    }, 400);
  } else if (deleteClickCount >= 2) {
    clearTimeout(deleteClickTimeout);
    deleteClickCount = 0;
    document.getElementById('delete-hint').classList.remove('show');
    const n = Math.min(2, takes.length);
    takes.splice(-n);
    updateUI();
    showStatus('УДАЛЕНО ' + n + ' ДУБЛЯ');
  }
}

function openModal() {
  if (isRecording) stopRecording();
  document.getElementById('modal-desc').textContent = `Склеить ${takes.length} ${pluralTake(takes.length)} в одно видео?`;
  document.getElementById('modal-takes').innerHTML = takes.map((t,i) =>
    `<div class="modal-take-chip">ДУБЛЬ ${i+1} · ${Math.floor(t.duration/1000)}с</div>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function pluralTake(n) { return n===1?'дубль':n<=4?'дубля':'дублей'; }

async function startRender() {
  closeModal();
  if (!takes.length) return;
  const progress = document.getElementById('render-progress');
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('render-label');
  progress.classList.add('show');
  try {
    label.textContent = 'ЗАГРУЗКА ДУБЛЕЙ...'; fill.style.width = '20%';
    const combined = new Blob(takes.map(t => t.blob), { type: takes[0].mimeType });
    fill.style.width = '80%'; label.textContent = 'ПОДГОТОВКА ФАЙЛА...';
    await new Promise(r => setTimeout(r, 400));
    fill.style.width = '100%'; label.textContent = 'ГОТОВО!';
    await new Promise(r => setTimeout(r, 400));
    const url = URL.createObjectURL(combined);
    const ext = takes[0].mimeType.includes('mp4') ? 'mp4' : 'webm';
    const a = document.createElement('a');
    a.href = url; a.download = `take_${Date.now()}.${ext}`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    progress.classList.remove('show');
    takes = []; updateUI(); showStatus('СКАЧАНО!');
  } catch(e) {
    label.textContent = 'ОШИБКА';
    setTimeout(() => progress.classList.remove('show'), 2000);
  }
}

let statusTimeout;
function showStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
  clearTimeout(statusTimeout);
  statusTimeout = setTimeout(updateStatusText, 2000);
}
function updateStatusText() {
  const el = document.getElementById('status-msg');
  if (isRecording) el.textContent = 'НАЖМИТЕ ДЛЯ СТОПА';
  else if (!takes.length) el.textContent = 'НАЖМИТЕ ДЛЯ ЗАПИСИ';
  else el.textContent = `ДУБЛЬ ${takes.length} ГОТОВ`;
}

function updateUI() {
  const btnRecord = document.getElementById('btn-record');
  const recBadge = document.getElementById('rec-badge');
  const pauseOverlay = document.getElementById('pause-overlay');
  const deleteBadge = document.getElementById('delete-count-badge');

  if (isRecording) {
    btnRecord.classList.add('recording');
    recBadge.classList.add('visible');
    pauseOverlay.classList.remove('active');
  } else {
    btnRecord.classList.remove('recording');
    recBadge.classList.remove('visible');
    pauseOverlay.classList[takes.length > 0 ? 'add' : 'remove']('active');
  }

  document.getElementById('take-counter').textContent =
    `ДУБЛЬ ${takes.length + (isRecording ? 0 : 1)}`;

  const canDelete = takes.length > 0 && !isRecording;
  document.getElementById('btn-delete').classList[canDelete ? 'remove' : 'add']('disabled');
  if (takes.length >= 2) { deleteBadge.textContent = '2'; deleteBadge.classList.add('show'); }
  else deleteBadge.classList.remove('show');

  document.getElementById('btn-edit').classList[takes.length >= 1 && !isRecording ? 'remove' : 'add']('disabled');

  const list = document.getElementById('takes-list');
  const total = takes.length + 3;
  list.innerHTML = Array.from({length: Math.min(total, 14)}, (_,i) => {
    let cls = 'take-pip';
    if (i < takes.length) cls += ' done';
    else if (i === takes.length && isRecording) cls += ' recording';
    return `<div class="${cls}"></div>`;
  }).join('');

  updateStatusText();
}

// Bluetooth / keyboard
const TRIGGER_KEYS = new Set([' ','Enter','ArrowUp','ArrowDown','MediaPlayPause','MediaPlay','MediaPause','VolumeUp','VolumeDown','F5','F8','PageUp','PageDown']);
document.addEventListener('keydown', e => {
  if (TRIGGER_KEYS.has(e.key)) { e.preventDefault(); handleRecord(); }
});

window.addEventListener('gamepadconnected', () => { startGamepadPolling(); });
let gamepadPolling = false;
function startGamepadPolling() {
  if (gamepadPolling) return;
  gamepadPolling = true;
  let prev = {};
  (function poll() {
    for (const gp of navigator.getGamepads()) {
      if (!gp) continue;
      gp.buttons.forEach((btn, i) => {
        const key = gp.index + '_' + i;
        if (btn.pressed && !prev[key]) handleRecord();
        prev[key] = btn.pressed;
      });
    }
    requestAnimationFrame(poll);
  })();
}

init();
</script>
</body>
</html>
